<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>

   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="style.css">

   
    <link rel="icon" href="resources/Logo.png" type="image/png">
</head>

<body>

  <header class="topbar">

    <div class="topbar__left">

        <button class="icon-btn" id="menuToggle">
            <img src="resources/menu.svg" alt="Menu">
        </button>

        <span class="topbar__logo">
            <img src="resources/Logo.png" alt="Google Keep Logo">
        </span>

        <h1 class="topbar__title">
            Keep
        </h1>

    </div>

    <div class="topbar__search">

        <img src="resources/search.svg" alt="Search">

        <input
            type="search"
            id="searchInput"
            placeholder="Search">

    </div>

    <div class="topbar__right">

        <button class="icon-btn" id="refreshBtn">
            <img src="resources/refresh.svg" alt="Refresh">
        </button>

        <button class="icon-btn" id="viewToggleBtn">
            <img src="resources/listView.svg" alt="List View">
        </button>

        <button class="icon-btn">
            <img src="resources/settings.svg" alt="Settings">
        </button>

        <button class="icon-btn">
            <img src="resources/googleApps.svg" alt="Google Apps">
        </button>

        <span class="topbar__avatar"></span>

    </div>

</header>  

<div class="layout">

    
    <nav class="sidebar" id="sidebar">

        <button class="sidebar__item is-active" data-view="notes">
            <img src="resources/notes.svg" alt="Notes">
            <span class="sidebar__label">Notes</span>
        </button>

        <button class="sidebar__item is-disabled">
            <img src="resources/reminders.svg" alt="Reminders">
            <span class="sidebar__label">Reminders</span>
        </button>

        <button class="sidebar__item is-disabled">
            <img src="resources/edit.svg" alt="Edit Labels">
            <span class="sidebar__label">Edit Labels</span>
        </button>

        <button class="sidebar__item" data-view="archive">
            <img src="resources/archive.svg" alt="Archive">
            <span class="sidebar__label">Archive</span>
        </button>

        <button class="sidebar__item is-disabled">
            <img src="resources/delete.svg" alt="Trash">
            <span class="sidebar__label">Trash</span>
        </button>

    </nav>

    
    <main class="board" id="board">
        <section class="composer" id="composer">

    <form id="composerForm" class="composer__form" data-color="default">

        <input
            type="text"
            id="composerTitle"
            class="composer__title"
            placeholder="Title">

        <textarea
            id="composerBody"
            class="composer__body"
            placeholder="Take a note..."
            rows="1">
        </textarea>

        <div class="composer__toolbar">

            <div class="composer__quick-actions">

                <button type="button" class="icon-btn">
                    <img src="resources/?" alt="Checklist">
                </button>

                <button
                    type="button"
                    class="icon-btn"
                    id="composerColorBtn">
                    <img src="resources/palette.svg" alt="Color">
                </button>

                <button type="button" class="icon-btn">
                    <img src="resources/image.svg" alt="Image">
                </button>

                <div
                    class="color-popover"
                    id="composerColorPopover"
                    hidden>

                    <div
                        class="composer__colors"
                        id="composerColors">
                    </div>

                </div>

            </div>

            <div class="composer__actions">

                <button
                    type="button"
                    class="btn btn--text"
                    id="composerCloseBtn">

                    Close

                </button>

            </div>

        </div>

    </form>

</section>
<div class="empty-state" id="emptyState" hidden>

    <img src="resources/notes2.svg" alt="">

    <p id="emptyStateText"></p>

</div>
<section
    class="notes-grid"
    id="notesGrid">
</section>

</main>

</div>


<template id="noteCardTemplate">
    <article class="note-card" tabindex="0">

        <h3 class="note-card__title"></h3>

        <p class="note-card__body"></p>

        <div class="note-card__footer">

            <time class="note-card__date"></time>

            <div class="note-card__actions">

                <button class="icon-btn note-card__archive">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M3 6h18v3H3zM5 9v11h14V9M10 13h4"
                              stroke="currentColor"
                              stroke-width="1.6"
                              fill="none"
                              stroke-linejoin="round"/>
                    </svg>
                </button>

                <button class="icon-btn note-card__unarchive" hidden>
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M12 20V9M6 14l6-6 6 6"
                              stroke="currentColor"
                              stroke-width="1.8"
                              fill="none"
                              stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                </button>

                <button class="icon-btn note-card__delete">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13"
                              stroke="currentColor"
                              stroke-width="1.6"
                              fill="none"
                              stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                </button>

            </div>

        </div>

    </article>
</template>


<div class="modal-overlay" id="modalOverlay" hidden>

    <div class="modal">

        <input
            type="text"
            id="modalTitle"
            class="modal__title"
            placeholder="Title">

        <textarea
            id="modalBody"
            class="modal__body"
            placeholder="Take a note...">
        </textarea>

        <div class="modal__toolbar">
            <div class="modal__meta" id="modalMeta"></div>
        </div>

        <div class="modal__footer">

            <button class="icon-btn" id="modalArchiveBtn">
                Archive
            </button>

            <button class="icon-btn" id="modalColorBtn">
                Color
            </button>

            <button class="icon-btn" id="modalDeleteBtn">
                Delete
            </button>

            <div
                class="color-popover color-popover--modal"
                id="modalColorPopover"
                hidden>

                <div
                    class="composer__colors"
                    id="modalColors">
                </div>

            </div>

            <button
                class="btn btn--text"
                id="modalCloseBtn">

                Close

            </button>

        </div>

    </div>

</div>


<div class="toast" id="toast" hidden>

    <span id="toastMessage"></span>

    <button
        class="toast__action"
        id="toastActionBtn">
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
